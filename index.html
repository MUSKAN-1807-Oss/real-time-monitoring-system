<!DOCTYPE html>
<html>
<head>
  <title>Monitoring System</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      background: linear-gradient(to right, #0f172a, #1e293b);
      color: white;
    }
    h1 {
      font-size: 40px;
      color: #38bdf8;
    }
    .box {
      margin-top: 30px;
      padding: 20px;
      border-radius: 10px;
      background: #1e293b;
      display: inline-block;
      width: 300px;
    }
    a {
      color: #22c55e;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>🚀 Real-Time Monitoring System</h1>
  <p>DevOps Project using Docker, Prometheus & Grafana</p>

  <div class="box">
    <h2>Status</h2>
    <p style="color:lightgreen;">Running ✅</p>
  </div>

  <div class="box">
    <h2>Grafana Dashboard</h2>
    <a href="http://localhost:3000" target="_blank">Open Grafana</a>
  </div>

  <div class="box">
    <h2>Prometheus</h2>
    <a href="http://localhost:9090" target="_blank">Open Prometheus</a>
  </div>

</body>
</html>
