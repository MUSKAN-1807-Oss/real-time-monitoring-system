services:

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana   

  nodeapp:
    image: node:18
    container_name: nodeapp
    ports:
      - "4000:3000"
    volumes:
      - .:/app
    working_dir: /app
    command: >
      sh -c "npm install -g http-server && http-server /app -p 3000"

volumes:
  grafana-storage: